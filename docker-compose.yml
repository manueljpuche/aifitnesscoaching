services:
  app:
    build: .
    container_name: fitness-app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - fitness
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
      POSTGRES_DB: fitness
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fitness
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fitness-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fitness
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: fitness-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - fitness
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  fitness:
    driver: bridge
